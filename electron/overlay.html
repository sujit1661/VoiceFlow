<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Flow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --surface: #1E1C1A;
  --border:  rgba(255,255,255,.12);
  --text:    rgba(232,228,220,.93);
  --muted:   rgba(156,149,144,.8);
  --green:   #4ADE80;
  --purple:  #9B7EC8;
  --orange:  #E87D2E;
  --red:     #EF4444;
}

html, body {
  width: 340px;
  height: 80px;
  overflow: hidden;
  background: transparent;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  /* Electron: click-through when not needed */
  -webkit-app-region: no-drag;
}

/* ── Pill ── */
.pill {
  position: fixed;
  bottom: 0; right: 0;
  width: 320px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 0 16px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 11px;
  box-shadow:
    0 12px 40px rgba(0,0,0,.65),
    0 3px 10px  rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.06);
  opacity: 0;
  transform: translateY(20px) scale(.94);
  transition:
    opacity  .32s cubic-bezier(.34,1.56,.64,1),
    transform .32s cubic-bezier(.34,1.56,.64,1);
  will-change: opacity, transform;
}
.pill.show  { opacity: 1;  transform: translateY(0) scale(1); }
.pill.hide  { opacity: 0;  transform: translateY(12px) scale(.96);
              transition: opacity .22s ease, transform .22s ease; }

/* ── Dot ── */
.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
  background: rgba(156,149,144,.5);
  transition: background .25s, box-shadow .25s;
}

/* ── Labels ── */
.labels { flex: 1; min-width: 0; }
.lbl-main {
  font-size: .84rem; font-weight: 700;
  color: var(--text);
  line-height: 1; margin-bottom: 4px;
}
.lbl-sub {
  font-size: .69rem;
  color: var(--muted);
  line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 200px;
  transition: color .2s;
}
/* When streaming tokens, show them in purple */
.lbl-sub.streaming { color: var(--purple); font-style: italic; }

/* ── Right-side widgets (only one shown at a time) ── */
.right { flex-shrink: 0; display: flex; align-items: center; }

/* Timer */
.timer {
  font-size: .78rem; font-weight: 700;
  color: var(--green);
  font-variant-numeric: tabular-nums;
  display: none;
}

/* Waveform */
.wave { display: none; align-items: flex-end; gap: 2.5px; height: 26px; }
.wb {
  width: 3px; border-radius: 2px;
  background: var(--green);
  animation: waveBounce 1.05s ease-in-out infinite;
}
.wb:nth-child(1){height:5px; animation-delay:.00s;}
.wb:nth-child(2){height:11px;animation-delay:.08s;}
.wb:nth-child(3){height:20px;animation-delay:.16s;}
.wb:nth-child(4){height:24px;animation-delay:.24s;}
.wb:nth-child(5){height:15px;animation-delay:.32s;}
.wb:nth-child(6){height:19px;animation-delay:.40s;}
.wb:nth-child(7){height:9px; animation-delay:.32s;}
.wb:nth-child(8){height:14px;animation-delay:.24s;}
@keyframes waveBounce {
  0%,100%{ transform:scaleY(.25); opacity:.3; }
  50%    { transform:scaleY(1);   opacity:1;  }
}

/* Spinner */
.spinner {
  display: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2.5px solid rgba(155,126,200,.2);
  border-top-color: var(--purple);
  animation: spin .65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Pulse dots (typing) */
.pulse-dots { display: none; align-items: center; gap: 4px; }
.pd {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--purple);
  animation: pdPulse 1.1s ease-in-out infinite;
}
.pd:nth-child(2){ animation-delay:.18s; }
.pd:nth-child(3){ animation-delay:.36s; }
@keyframes pdPulse {
  0%,100%{ transform:scale(.4); opacity:.25; }
  50%    { transform:scale(1);  opacity:1;   }
}

/* Checkmark */
.check {
  display: none;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(74,222,128,.15);
  border: 1.5px solid rgba(74,222,128,.35);
  align-items: center; justify-content: center;
  font-size: 13px;
}

/* Error shake */
@keyframes shake {
  0%,100%{ transform:translateX(0) scale(1); }
  20%,60%{ transform:translateX(-5px) scale(1); }
  40%,80%{ transform:translateX(5px)  scale(1); }
}
.shake { animation: shake .35s ease; }
</style>
</head>
<body>

<div class="pill" id="pill">
  <div class="dot"    id="dot"></div>

  <div class="labels">
    <div class="lbl-main" id="lblMain">Flow</div>
    <div class="lbl-sub"  id="lblSub">Waiting for hotkey…</div>
  </div>

  <div class="right" id="right">
    <div class="timer"      id="timer">00:00</div>
    <div class="wave"       id="wave">
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div><div class="wb"></div>
    </div>
    <div class="spinner"    id="spinner"></div>
    <div class="pulse-dots" id="pulseDots">
      <div class="pd"></div><div class="pd"></div><div class="pd"></div>
    </div>
    <div class="check"      id="check">✓</div>
  </div>
</div>

<script>
// ── Elements ──────────────────────────────────────────────────────────────────
const pill      = document.getElementById('pill');
const dot       = document.getElementById('dot');
const lblMain   = document.getElementById('lblMain');
const lblSub    = document.getElementById('lblSub');
const elTimer   = document.getElementById('timer');
const elWave    = document.getElementById('wave');
const elSpinner = document.getElementById('spinner');
const elPulse   = document.getElementById('pulseDots');
const elCheck   = document.getElementById('check');

// ── State config ──────────────────────────────────────────────────────────────
const STATES = {
  idle:       { dot:'rgba(156,149,144,.5)', main:'Flow',         sub:'Hold Ctrl to record',       right:null,       autohide:3500 },
  recording:  { dot:'#4ADE80',             main:'Recording',    sub:'Release Ctrl to stop…',     right:'wave',     autohide:null },
  processing: { dot:'#7B5EA7',             main:'Transcribing', sub:'Sending to Whisper…',       right:'spinner',  autohide:null },
  polishing:  { dot:'#9B7EC8',             main:'Polishing',    sub:'AI cleaning text…',         right:'spinner',  autohide:null },
  typing:     { dot:'#9B7EC8',             main:'Typing',       sub:'',                          right:'pulse',    autohide:null },
  done:       { dot:'#4ADE80',             main:'Done ✨',       sub:'Text typed successfully',   right:'check',    autohide:1800 },
  no_speech:  { dot:'#E87D2E',             main:'No speech',    sub:'Try speaking louder',        right:null,       autohide:2200 },
  error:      { dot:'#EF4444',             main:'Error',        sub:'',                          right:null,       autohide:2500 },
};

// ── Timer ─────────────────────────────────────────────────────────────────────
let timerSec = 0, timerTick = null;

function startTimer() {
  timerSec = 0;
  elTimer.textContent = '00:00';
  elTimer.style.display = 'block';
  timerTick = setInterval(() => {
    timerSec++;
    const m = String(Math.floor(timerSec / 60)).padStart(2,'0');
    const s = String(timerSec % 60).padStart(2,'0');
    elTimer.textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  if (timerTick) { clearInterval(timerTick); timerTick = null; }
  elTimer.style.display = 'none';
}

// ── Right-widget visibility ───────────────────────────────────────────────────
function showRight(which) {
  elTimer.style.display   = 'none';
  elWave.style.display    = 'none';
  elSpinner.style.display = 'none';
  elPulse.style.display   = 'none';
  elCheck.style.display   = 'none';
  stopTimer();

  if (which === 'wave')    { elWave.style.display    = 'flex'; startTimer(); }
  if (which === 'spinner') { elSpinner.style.display = 'block'; }
  if (which === 'pulse')   { elPulse.style.display   = 'flex'; }
  if (which === 'check')   { elCheck.style.display   = 'flex'; }
}

// ── Pill show / hide ──────────────────────────────────────────────────────────
let hideTimeout = null;

function showPill() {
  if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
  pill.classList.remove('hide');
  pill.classList.add('show');
}

function hidePill() {
  pill.classList.add('hide');
  setTimeout(() => pill.classList.remove('show', 'hide'), 250);
}

// ── Apply state ───────────────────────────────────────────────────────────────
function applyState(key, text) {
  const cfg = STATES[key] || STATES.idle;

  dot.style.background = cfg.dot;
  dot.style.boxShadow  = `0 0 7px ${cfg.dot}90`;

  lblMain.textContent = cfg.main;

  // Sub-label: streaming text shown in purple italic, else normal
  if (key === 'typing' || key === 'token') {
    lblSub.textContent = text || '…';
    lblSub.classList.add('streaming');
  } else {
    lblSub.textContent = text || cfg.sub;
    lblSub.classList.remove('streaming');
  }

  showRight(cfg.right);
  showPill();

  if (key === 'error' || key === 'no_speech') {
    pill.classList.remove('shake');
    void pill.offsetWidth;   // reflow to restart animation
    pill.classList.add('shake');
    setTimeout(() => pill.classList.remove('shake'), 400);
  }

  if (hideTimeout) clearTimeout(hideTimeout);
  if (cfg.autohide) {
    hideTimeout = setTimeout(hidePill, cfg.autohide);
  }
}

// ── WebSocket connection (auto-reconnect) ─────────────────────────────────────
let wsRetry = null;

function connect() {
  let ws;
  try { ws = new WebSocket('ws://127.0.0.1:8765'); }
  catch(e) { scheduleReconnect(); return; }

  ws.onopen = () => {
    if (wsRetry) { clearTimeout(wsRetry); wsRetry = null; }
    applyState('idle');
  };

  ws.onmessage = (e) => {
    try {
      const { state, text } = JSON.parse(e.data);
      applyState(state, text);
    } catch(err) {}
  };

  ws.onerror = () => {};
  ws.onclose = () => scheduleReconnect();
}

function scheduleReconnect() {
  if (wsRetry) return;
  wsRetry = setTimeout(() => { wsRetry = null; connect(); }, 1500);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
connect();
applyState('idle', 'Connecting…');
showPill();
</script>
</body>
</html>
